apiVersion: v1 
kind: Service
metadata:
  name: nginx-lb 
spec:
  type: LoadBalancer
  selector:
    # labels are the selectors
    project: roboshop
    environment: dev
    component: frontend
  ports:
  - protocol: TCP
    port: 80 #service port
    targetPort: 80 # container port
    NodePort: 32323