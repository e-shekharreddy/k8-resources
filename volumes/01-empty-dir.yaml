apiVersion: v1
kind: Pod
metadata:
  name: exampl-pod
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: nginx-log
      mountPath: /var/log/nginx
  - image: almalinux:9
    name: almalinux
    command: ["sleep", "2000"]
    volumeMounts:
    - name: /mnt/nginx-log
      mountPath: nginx-log
      readOnly: true
  # this is pod level
  volumes:
  - name: shared-data
    emptyDir:
      sizeLimit: 500Mi